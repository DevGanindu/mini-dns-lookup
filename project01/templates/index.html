<!DOCTYPE html>
<html>
<head>
    <title>DNS Resolver</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; width: 300px; margin: auto; border-radius: 10px; }
        input[type="text"] { padding: 8px; width: 80%; margin-bottom: 10px; }
        input[type="submit"] { padding: 8px 15px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Mini DNS Lookup</h2>
        
        <form method="POST">
            <input type="text" name="domain" placeholder="Enter URL (e.g., google.com)" required>
            <br>
            <input type="submit" value="Find IP Address">
        </form>

        {% if result %}
            <div class="result">
                Result: {{ result }}
            </div>
        {% endif %}
    </div>

</body>
</html>
